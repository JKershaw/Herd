<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Herd — Sprite Reference</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a2410; color: #a0b878;
      font-family: 'Courier New', monospace;
      padding: 32px; min-height: 100vh;
    }
    h1 { color: #d0dca8; font-size: 18px; letter-spacing: 4px; margin-bottom: 24px; }
    h2 { color: #8a9868; font-size: 13px; letter-spacing: 2px; margin-bottom: 12px; margin-top: 28px; }
    .sheet {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      height: auto;
      border: 1px solid #2a3a18;
      background: #1a2410;
    }
    .sheep-sheet { width: 576px; }
    .dog-sheet { width: 720px; }
    .note {
      color: #5a6838; font-size: 11px; margin-top: 8px;
    }
    .missing {
      color: #6a4828; font-size: 12px; padding: 12px;
      border: 1px dashed #3a2a18;
    }
  </style>
</head>
<body>
  <h1>SPRITE REFERENCE</h1>
  <p class="note" style="margin-bottom: 20px">
    Generated by <code>npm run screenshots</code> — run that first if images are missing.
  </p>

  <h2>SHEEP</h2>
  <img class="sheet sheep-sheet" src="sprites-sheep-desktop.png"
       alt="Sheep sprites: Walking, Grazing, Panicking, Settled"
       onerror="this.outerHTML='<div class=missing>sprites-sheep-desktop.png not found — run npm run screenshots</div>'" />
  <p class="note">States: Walking · Grazing · Panicking · Settled</p>

  <h2>DOG</h2>
  <img class="sheet dog-sheet" src="sprites-dog-desktop.png"
       alt="Dog sprites: Right, Down, Left, Up, Whistle, Looking"
       onerror="this.outerHTML='<div class=missing>sprites-dog-desktop.png not found — run npm run screenshots</div>'" />
  <p class="note">Poses: Right · Down · Left · Up · Whistle · Looking</p>
</body>
</html>
